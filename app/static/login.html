<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Extrovert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light py-3">
        <div class="container justify-content-center">
            <a class="navbar-brand fs-3 fw-bold" href="index.html">Extrovert</a>
        </div>
    </nav>

    <main class="main-content d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card p-4 shadow-sm">
                        <div class="card-body">
                            <h2 class="fw-bold text-dark mb-2">Sign In</h2>
                            <p class="text-muted mb-4">Stay updated on your professional world</p>
                            
                            <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

                            <form id="loginForm">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="email" required autocomplete="email">
                                </div>
                                <div class="mb-4">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" required autocomplete="current-password">
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Sign In</button>
                            </form>

                            <div class="text-center mt-3">
                                <span class="text-muted">New to Extrovert?</span>
                                <a href="signup.html" class="text-decoration-none fw-bold ms-1">Join now</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        checkGuestOrRedirect();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');
            
            errorAlert.classList.add('d-none');
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    saveToken(data.access_token);
                    window.location.href = 'feed.html';
                } else {
                    errorAlert.textContent = data.detail || 'Invalid credentials. Please try again.';
                    errorAlert.classList.remove('d-none');
                }
            } catch (error) {
                errorAlert.textContent = 'Server connection failed. Please ensure the backend is running.';
                errorAlert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
