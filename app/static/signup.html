<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Extrovert - Be Social. Be Extrovert.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light py-3">
        <div class="container justify-content-center">
            <a class="navbar-brand fs-3 fw-bold" href="index.html">Extrovert</a>
        </div>
    </nav>

    <main class="main-content d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card p-4 shadow-sm">
                        <div class="card-body">
                            <h2 class="fw-bold text-dark mb-2">Join Extrovert</h2>
                            <p class="text-muted mb-4">Make the most of your professional life</p>
                            
                            <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>
                            <div id="successAlert" class="alert alert-success d-none" role="alert"></div>

                            <form id="signupForm">
                                <div class="mb-3">
                                    <label for="username" class="form-label">Username</label>
                                    <input type="text" class="form-control" id="username" required minlength="3">
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="mb-4">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" required minlength="6">
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Agree & Join</button>
                            </form>

                            <div class="text-center mt-3">
                                <span class="text-muted">Already on Extrovert?</span>
                                <a href="login.html" class="text-decoration-none fw-bold ms-1">Sign in</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        checkGuestOrRedirect();

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');
            
            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');
            
            try {
                const response = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successAlert.textContent = 'Account created successfully! Redirecting to login page...';
                    successAlert.classList.remove('d-none');
                    document.getElementById('signupForm').reset();
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorAlert.textContent = data.detail || 'Sign up failed. Please check inputs.';
                    errorAlert.classList.remove('d-none');
                }
            } catch (error) {
                errorAlert.textContent = 'Server connection failed. Please ensure the backend is running.';
                errorAlert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
